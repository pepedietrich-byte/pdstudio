<style>
/* ============================================================
   PHO SAIGON — single-file premium build
   Drenched-warm amber palette · Bricolage Grotesque + Inter
   ============================================================ */

:root {
  --ease-out:    cubic-bezier(0.23, 1, 0.32, 1);
  --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);

  /* DRENCHED-WARM — spiced amber / mahogany */
  --brand:        oklch(0.36 0.092 48);
  --brand-deep:   oklch(0.28 0.076 44);
  --brand-rich:   oklch(0.32 0.084 46);
  --brand-bright: oklch(0.60 0.128 65);
  --brand-dark:   oklch(0.20 0.062 40);

  --ink:          oklch(0.97 0.018 80);
  --ink-soft:     oklch(0.87 0.022 76);
  --ink-mute:     oklch(0.74 0.028 70);
  --ink-faint:    oklch(0.64 0.032 64);

  --line:         oklch(0.97 0.018 80 / 0.15);
  --line-strong:  oklch(0.97 0.018 80 / 0.28);

  --cream:        oklch(0.96 0.022 82);
  --ink-on-cream: oklch(0.20 0.060 42);

  --display: "Bricolage Grotesque", "Inter", system-ui, sans-serif;
  --sans:    "Inter", system-ui, -apple-system, sans-serif;
  --mono:    "JetBrains Mono", ui-monospace, monospace;

  --r-sm:  4px;
  --r-md:  10px;
  --r-lg:  14px;

  --container:    1320px;
  --section-y-d:  clamp(96px, 12vw, 160px);
  --section-y-m:  72px;
  --banner-h:     36px;
  --nav-h:        68px;
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; }
*::selection { background: var(--cream); color: var(--ink-on-cream); }
html { scroll-behavior: smooth; }
html, body {
  margin: 0; padding: 0;
  background: var(--brand);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
img { max-width: 100%; display: block; }
a {
  color: inherit;
  text-decoration: none;
  transition: color 200ms var(--ease-out), opacity 200ms var(--ease-out);
}
a:hover { color: var(--cream); }
button { font: inherit; cursor: pointer; }
input, textarea { font: inherit; color: inherit; }

/* ===== TYPOGRAPHY HELPERS ===== */
.eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.lead {
  font-size: clamp(17px, 1.4vw, 19px);
  line-height: 1.55;
  color: var(--ink-soft);
  max-width: 58ch;
  text-wrap: pretty;
}

/* ===== CONTAINER & SECTION ===== */
.container {
  width: 100%;
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 clamp(20px, 5vw, 48px);
}
section {
  padding: var(--section-y-d) 0;
  position: relative;
}
@media (max-width: 768px) {
  section { padding: var(--section-y-m) 0; }
}

/* ===== DEMO BANNER ===== */
.demo-banner {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--banner-h);
  background: var(--brand-dark);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--ink-mute);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 20px;
}

/* ===== NAV ===== */
.nav {
  position: sticky;
  top: var(--banner-h);
  z-index: 50;
  background: oklch(0.36 0.092 48 / 0.82);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border-bottom: 1px solid var(--line);
  transition: background 300ms var(--ease-out);
}
.nav.scrolled {
  background: oklch(0.36 0.092 48 / 0.97);
}
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: var(--nav-h);
  gap: 24px;
}
.nav-brand {
  display: flex;
  flex-direction: column;
  gap: 2px;
  font-family: var(--display);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.020em;
  color: var(--ink);
  line-height: 1;
  flex-shrink: 0;
}
.nav-brand:hover { color: var(--ink); }
.nav-brand small {
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 400;
  letter-spacing: 0.16em;
  color: var(--ink-mute);
  text-transform: uppercase;
}
.nav-links {
  display: flex;
  align-items: center;
  gap: clamp(18px, 2.5vw, 32px);
  list-style: none;
  margin: 0; padding: 0;
}
.nav-links a {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink-soft);
  letter-spacing: -0.005em;
}
.nav-links a:hover { color: var(--ink); }
.nav-ctas { display: flex; gap: 8px; align-items: center; }
.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 40px;
  padding: 0 18px;
  border-radius: 999px;
  background: var(--cream);
  color: var(--ink-on-cream);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: -0.005em;
  border: 0;
  transition: transform 160ms var(--ease-out), background 200ms var(--ease-out);
}
.nav-cta:hover { background: oklch(1 0 0); color: var(--ink-on-cream); }
.nav-cta:active { transform: scale(0.97); }
.nav-toggle {
  display: none;
  width: 40px; height: 40px;
  background: transparent;
  border: 1px solid var(--line-strong);
  border-radius: var(--r-md);
  color: var(--ink);
  align-items: center;
  justify-content: center;
}
@media (max-width: 960px) {
  .nav-links { display: none; }
  .nav-toggle { display: inline-flex; }
}
.mobile-menu {
  position: fixed;
  top: calc(var(--banner-h) + var(--nav-h));
  left: 0; right: 0; bottom: 0;
  background: var(--brand);
  border-top: 1px solid var(--line);
  padding: 32px clamp(20px, 5vw, 48px);
  transform: translateY(-12px);
  opacity: 0;
  pointer-events: none;
  transition: transform 240ms var(--ease-out), opacity 200ms var(--ease-out);
  z-index: 49;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow-y: auto;
}
.mobile-menu.open {
  transform: translateY(0);
  opacity: 1;
  pointer-events: auto;
}
.mobile-menu a {
  font-family: var(--display);
  font-weight: 600;
  font-size: 32px;
  letter-spacing: -0.025em;
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
  color: var(--ink);
}
.mobile-row {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}

/* ===== BUTTONS ===== */
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  height: 60px;
  padding: 0 32px;
  border-radius: 999px;
  background: var(--cream);
  color: var(--ink-on-cream);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.010em;
  border: 0;
  cursor: pointer;
  text-decoration: none;
  transition: transform 160ms var(--ease-out), background 200ms var(--ease-out), box-shadow 200ms var(--ease-out);
}
.btn-primary:hover {
  background: oklch(1 0 0);
  color: var(--ink-on-cream);
  box-shadow: 0 16px 36px -10px oklch(0 0 0 / 0.22);
}
.btn-primary:active { transform: scale(0.97); }

.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  height: 60px;
  padding: 0 28px;
  border-radius: 999px;
  background: transparent;
  color: var(--ink);
  font-weight: 600;
  font-size: 16px;
  letter-spacing: -0.005em;
  border: 1.5px solid var(--line-strong);
  cursor: pointer;
  text-decoration: none;
  transition: transform 160ms var(--ease-out), border-color 200ms var(--ease-out), background 200ms var(--ease-out);
}
.btn-ghost:hover {
  border-color: var(--cream);
  background: oklch(0.97 0.018 80 / 0.06);
  color: var(--ink);
}
.btn-ghost:active { transform: scale(0.97); }

/* ===== HERO ===== */
.hero {
  min-height: calc(100dvh - var(--banner-h) - var(--nav-h));
  padding: clamp(60px, 8vw, 108px) 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background: var(--brand);
}
/* Warm glow overlay top-left */
.hero::before {
  content: '';
  position: absolute;
  top: -20%; left: -15%;
  width: 65vw; height: 65vw;
  border-radius: 50%;
  background: radial-gradient(circle, oklch(0.60 0.128 65 / 0.10) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

.hero-img {
  position: absolute;
  inset: 0 0 0 40%;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}
.hero-img::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(90deg, var(--brand) 0%, oklch(0.36 0.092 48 / 0.12) 50%, transparent 100%),
    linear-gradient(180deg, oklch(0.36 0.092 48 / 0.35) 0%, transparent 28%, transparent 62%, var(--brand-deep) 100%);
  z-index: 1;
}
.hero-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
  filter: brightness(0.72) saturate(0.82) contrast(1.06);
}
@media (max-width: 860px) {
  .hero-img { inset: 0; opacity: 0.28; }
  .hero-img::before {
    background: linear-gradient(180deg, var(--brand) 0%, oklch(0.36 0.092 48 / 0.65) 60%, var(--brand) 100%);
  }
}

.hero-content {
  position: relative;
  z-index: 1;
}
.hero-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 24px;
  margin-bottom: clamp(48px, 8vw, 96px);
}
.eyebrow-line {
  display: inline-block;
  width: 32px; height: 1px;
  background: var(--line-strong);
  vertical-align: middle;
  margin-right: 12px;
}
.live {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-soft);
  flex-shrink: 0;
}
.pulse {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--ink);
  display: inline-block;
  animation: pulse 2.2s var(--ease-out) infinite;
}
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 oklch(0.97 0.018 80 / 0.60); }
  100% { box-shadow: 0 0 0 9px oklch(0.97 0.018 80 / 0); }
}

.hero-main {
  position: relative;
  z-index: 1;
}
.hero h1 {
  font-family: var(--display);
  font-weight: 600;
  font-size: clamp(56px, 11vw, 158px);
  line-height: 0.88;
  letter-spacing: -0.040em;
  margin: 0;
  color: var(--ink);
  text-wrap: balance;
  font-variation-settings: 'opsz' 96;
}
.hero h1 .light {
  font-weight: 300;
  font-style: italic;
  letter-spacing: -0.030em;
  display: block;
  color: var(--ink-soft);
}

.hero-meta-row {
  display: grid;
  grid-template-columns: 6fr 4fr 4fr;
  gap: clamp(20px, 3vw, 56px);
  align-items: end;
  margin-top: clamp(48px, 7vw, 96px);
  padding-top: 28px;
  border-top: 1px solid var(--line);
}
@media (max-width: 760px) {
  .hero-meta-row { grid-template-columns: 1fr; gap: 28px; padding-top: 24px; }
}
.hero-sub {
  font-size: clamp(15px, 1.4vw, 17px);
  line-height: 1.52;
  color: var(--ink-soft);
  max-width: 38ch;
  margin: 0;
  text-wrap: pretty;
}
.hero-meta-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.hero-meta-item .k {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.hero-meta-item .v {
  font-family: var(--display);
  font-size: clamp(19px, 1.8vw, 24px);
  font-weight: 500;
  letter-spacing: -0.016em;
  color: var(--ink);
  line-height: 1.15;
}
.hero-meta-item .v small {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 400;
  color: var(--ink-mute);
  letter-spacing: 0;
  margin-left: 5px;
}
.hero-ctas {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-top: clamp(36px, 5vw, 52px);
}
@media (max-width: 480px) {
  .hero-ctas { flex-direction: column; align-items: stretch; }
}

/* ===== TRUST STRIP ===== */
.trust {
  padding: 36px 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  background: oklch(0.33 0.084 46);
}
.trust-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}
.trust-item {
  display: inline-flex;
  align-items: baseline;
  gap: 12px;
}
.trust-item .n {
  font-family: var(--display);
  font-size: clamp(22px, 2.8vw, 36px);
  font-weight: 500;
  letter-spacing: -0.025em;
  line-height: 1;
  color: var(--ink);
}
.trust-item .l {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
  max-width: 20ch;
  line-height: 1.4;
}

/* ===== SHOWCASE ===== */
.showcase {
  position: relative;
  width: 100%;
  height: clamp(340px, 60vh, 620px);
  overflow: hidden;
  background: var(--brand-deep);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.showcase img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  filter: brightness(0.82) contrast(1.06) saturate(0.88);
}
.showcase::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, oklch(0.28 0.076 44 / 0.22) 0%, transparent 28%, transparent 55%, oklch(0.28 0.076 44 / 0.90) 100%),
    linear-gradient(90deg, oklch(0.28 0.076 44 / 0.52) 0%, transparent 44%);
  pointer-events: none;
}
.showcase-text {
  position: absolute;
  left: clamp(20px, 5vw, 64px);
  bottom: clamp(28px, 5vw, 56px);
  z-index: 1;
  max-width: 480px;
}
.showcase-text .eyebrow {
  display: block;
  margin-bottom: 12px;
}
.showcase-text p {
  font-family: var(--display);
  font-style: italic;
  font-weight: 400;
  font-size: clamp(19px, 2.2vw, 28px);
  line-height: 1.22;
  letter-spacing: -0.020em;
  color: var(--ink);
  margin: 0;
  text-wrap: balance;
}

/* ===== MANIFESTO / KONZEPT ===== */
.manifesto-grid {
  display: grid;
  grid-template-columns: 5fr 7fr;
  gap: clamp(40px, 6vw, 96px);
  align-items: start;
}
@media (max-width: 920px) {
  .manifesto-grid { grid-template-columns: 1fr; gap: 40px; }
}
.manifesto-side h2 {
  font-family: var(--display);
  font-weight: 500;
  font-size: clamp(36px, 5.2vw, 72px);
  line-height: 0.94;
  letter-spacing: -0.030em;
  margin: 16px 0 0;
  color: var(--ink);
  text-wrap: balance;
}
.manifesto-side h2 em {
  font-style: italic;
  font-weight: 400;
  color: var(--ink-soft);
}
.manifesto-image {
  margin-top: 32px;
  border-radius: var(--r-lg);
  overflow: hidden;
  border: 1px solid var(--line);
  position: relative;
}
.manifesto-image img {
  width: 100%; height: auto;
  display: block;
  filter: brightness(0.88) contrast(1.04) saturate(0.90);
}
.manifesto-image::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 58%, oklch(0.28 0.076 44 / 0.22) 100%);
  pointer-events: none;
}
.manifesto-body p {
  font-size: clamp(16px, 1.3vw, 18px);
  line-height: 1.62;
  color: var(--ink-soft);
  max-width: 56ch;
  margin: 0 0 22px;
  text-wrap: pretty;
}
.manifesto-body p:first-of-type {
  font-size: clamp(17px, 1.4vw, 20px);
  color: var(--ink);
}
.manifesto-list {
  margin: 36px 0 0;
  padding: 28px 0 0;
  border-top: 1px solid var(--line);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
}
@media (max-width: 600px) {
  .manifesto-list { grid-template-columns: 1fr; }
}
.manifesto-item {
  padding: 0 24px 0 0;
  border-right: 1px solid var(--line);
}
.manifesto-item:last-child { border-right: 0; padding-right: 0; }
@media (max-width: 600px) {
  .manifesto-item { padding: 18px 0; border-right: 0; border-bottom: 1px solid var(--line); }
  .manifesto-item:last-child { border-bottom: 0; }
}
.manifesto-item .k {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 8px;
}
.manifesto-item .v {
  font-family: var(--display);
  font-size: clamp(15px, 1.3vw, 18px);
  font-weight: 500;
  letter-spacing: -0.012em;
  line-height: 1.28;
  color: var(--ink);
}

/* ===== MENU SECTION ===== */
.menu-section {
  background: var(--brand-deep);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.menu-head {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 32px;
  align-items: end;
  margin-bottom: clamp(52px, 7vw, 88px);
}
@media (max-width: 760px) {
  .menu-head { grid-template-columns: 1fr; align-items: start; gap: 24px; }
}
.menu-head h2 {
  font-family: var(--display);
  font-weight: 600;
  font-size: clamp(50px, 9vw, 128px);
  line-height: 0.87;
  letter-spacing: -0.040em;
  margin: 16px 0 0;
  color: var(--ink);
  text-wrap: balance;
  font-variation-settings: 'opsz' 96;
}
.menu-head h2 em { font-style: italic; font-weight: 400; color: var(--ink-soft); }
.menu-spread {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(28px, 4vw, 48px) clamp(44px, 7vw, 110px);
}
@media (max-width: 760px) {
  .menu-spread { grid-template-columns: 1fr; }
}
.menu-group { display: flex; flex-direction: column; gap: 20px; }
.menu-group-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line-strong);
}
.menu-group-head h3 {
  font-family: var(--display);
  font-weight: 600;
  font-size: 20px;
  letter-spacing: -0.016em;
  margin: 0;
  color: var(--ink);
}
.menu-group-head span {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.dish {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: baseline;
}
.dish-name {
  font-family: var(--display);
  font-weight: 600;
  font-size: 18px;
  letter-spacing: -0.012em;
  color: var(--ink);
  line-height: 1.22;
  margin: 0 0 4px;
}
.dish-name em { font-style: italic; font-weight: 400; color: var(--ink-soft); }
.dish-desc {
  font-size: 13px;
  line-height: 1.52;

}
.dish-price {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;

}
.dish-tag {
  display: inline-block;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-mute);
  padding: 2px 7px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  margin-left: 7px;
  vertical-align: middle;
}
.menu-note {
  margin-top: clamp(48px, 6vw, 68px);
  padding-top: 32px;
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}
.menu-note p { margin: 0; font-size: 14px; color: var(--ink-soft); max-width: 60ch; }

/* ===== HOURS ===== */
.hours-section {
  background: var(--brand-deep);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.hours-grid {
  display: grid;
  grid-template-columns: 4fr 8fr;
  gap: clamp(40px, 6vw, 96px);
  align-items: start;
}
@media (max-width: 920px) {
  .hours-grid { grid-template-columns: 1fr; gap: 32px; }
}
.hours-head h2 {
  font-family: var(--display);
  font-weight: 600;
  font-size: clamp(36px, 5vw, 58px);
  line-height: 0.94;
  letter-spacing: -0.028em;
  margin: 16px 0 16px;
  color: var(--ink);
}
.hours-head h2 em { font-style: italic; font-weight: 400; color: var(--ink-soft); }
.hours-head .lead { max-width: 36ch; }
.hours-list {
  border-top: 1px solid var(--line);
}
.hours-row {
  display: grid;
  grid-template-columns: 130px 1fr auto;
  gap: 16px;
  align-items: baseline;
  padding: 17px 0;
  border-bottom: 1px solid var(--line);
}
.hours-row.today {
  background: oklch(0.97 0.018 80 / 0.04);
  padding: 17px 14px;
  margin: 0 -14px;
}
.hours-row .day {
  font-family: var(--display);
  font-weight: 600;
  font-size: 18px;
  letter-spacing: -0.014em;
  color: var(--ink);
}
.hours-row .marker {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.hours-row.today .marker { color: var(--ink); }
.hours-row .time {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -0.010em;
}
.hours-row .time.closed {
  color: var(--ink-mute);
  font-style: italic;
}

/* ===== CONTACT ===== */
.contact-section {
  background: var(--brand-deep);
  border-top: 1px solid var(--line);
}
.contact-grid {
  display: grid;
  grid-template-columns: 7fr 5fr;
  gap: clamp(40px, 6vw, 96px);
  align-items: start;
}
@media (max-width: 920px) {
  .contact-grid { grid-template-columns: 1fr; gap: 48px; }
}
.contact-side h2 {
  font-family: var(--display);
  font-weight: 600;
  font-size: clamp(36px, 5.2vw, 64px);
  line-height: 0.94;
  letter-spacing: -0.028em;
  margin: 16px 0 16px;
  color: var(--ink);
}
.contact-side h2 em { font-style: italic; font-weight: 400; color: var(--ink-soft); }
.contact-lead {
  color: var(--ink-soft);
  font-size: 16px;
  line-height: 1.60;
  max-width: 50ch;
  margin: 0 0 32px;
}
.contact-block {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 36px;
}
@media (max-width: 600px) {
  .contact-block { grid-template-columns: 1fr; }
}
.contact-cell .key {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 8px;
}
.contact-cell .val {
  font-family: var(--display);
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.012em;
  color: var(--ink);
  line-height: 1.38;
}
.contact-cell .val small {
  display: block;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-mute);
  font-weight: 400;
  margin-top: 3px;
}
.contact-cell .val.mono {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0;
}
.contact-cell .val a {
  color: var(--ink);
  border-bottom: 1px solid var(--line-strong);
  padding-bottom: 1px;
}
.contact-cell .val a:hover { color: var(--cream); border-bottom-color: var(--cream); }

/* ===== FORM ===== */
.contact-form { display: flex; flex-direction: column; gap: 16px; }
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
@media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
.form-field { display: flex; flex-direction: column; gap: 6px; }
.form-label {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.form-input {
  background: oklch(0.97 0.018 80 / 0.06);
  border: 1px solid var(--line-strong);
  border-radius: var(--r-md);
  padding: 13px 16px;
  font-size: 15px;
  color: var(--ink);
  width: 100%;
  outline: none;
  transition: border-color 200ms var(--ease-out), background 200ms var(--ease-out);
  -webkit-appearance: none;
}
.form-input::placeholder { color: var(--ink-faint); }
.form-input:focus {
  border-color: var(--cream);
  background: oklch(0.97 0.018 80 / 0.10);
}
.form-textarea { resize: vertical; min-height: 120px; }
.form-success {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 20px 24px;
  background: oklch(0.97 0.018 80 / 0.05);
  border: 1px solid var(--line-strong);
  border-radius: var(--r-lg);
}
.form-success svg { flex-shrink: 0; color: var(--cream); margin-top: 2px; }
.form-success p { font-size: 15px; color: var(--ink-soft); margin: 0; line-height: 1.5; }

.contact-map-col { display: flex; flex-direction: column; }

/* ===== FOOTER ===== */
footer {
  background: oklch(0.22 0.062 40);
  border-top: 1px solid var(--line);
  padding: 80px 0 32px;
}
.footer-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 40px;
  margin-bottom: 64px;
}
@media (max-width: 760px) { .footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; } }
@media (max-width: 500px) { .footer-grid { grid-template-columns: 1fr; } }
.footer-brand {
  font-family: var(--display);
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.028em;
  color: var(--ink);
  margin-bottom: 10px;
  line-height: 1;
}
.footer-brand small {
  display: block;
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-top: 8px;
}
.footer-tag {
  color: var(--ink-soft);
  font-size: 14px;
  max-width: 36ch;
  line-height: 1.55;
  margin: 0;
}
.footer-col h4 {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin: 0 0 18px;
}
.footer-col ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
.footer-col a { color: var(--ink-soft); font-size: 14px; }
.footer-col a:hover { color: var(--ink); }
.footer-col p { color: var(--ink-soft); font-size: 14px; line-height: 1.55; margin: 0 0 5px; }
.footer-col p strong { color: var(--ink); font-weight: 500; }
.footer-bottom {
  border-top: 1px solid var(--line);
  padding-top: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.footer-bottom p {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--ink-mute);
  margin: 0;
}
.footer-bottom p strong { color: var(--ink-soft); font-weight: 500; }
.demo-tag {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mute);
  padding: 4px 10px;
  border: 1px solid var(--line-strong);
  border-radius: var(--r-sm);
}

/* ===== LEGAL MODAL ===== */
.legal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: oklch(0.16 0.062 40 / 0.88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.legal-box {
  background: var(--brand-rich);
  border: 1px solid var(--line-strong);
  border-radius: var(--r-lg);
  max-width: 600px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 36px 32px;
}
@media (max-width: 600px) { .legal-box { padding: 24px 20px; } }
.legal-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 24px;
  margin-bottom: 24px;
}
.legal-header h2 {
  font-family: var(--display);
  font-weight: 600;
  font-size: 30px;
  letter-spacing: -0.022em;
  margin: 0;
  color: var(--ink);
}
.legal-header button {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--ink);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 180ms var(--ease-out);
}
.legal-header button:hover { background: oklch(0.97 0.018 80 / 0.08); }
.legal-body { color: var(--ink-soft); font-size: 14.5px; line-height: 1.65; }
.legal-body p { margin: 0 0 14px; }
.legal-body p:last-child { margin-bottom: 0; }
.legal-body a { color: var(--ink); border-bottom: 1px solid var(--line-strong); padding-bottom: 1px; }

/* ===== REVEAL ===== */
.reveal {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 700ms var(--ease-out), transform 700ms var(--ease-out);
}
.reveal.in {
  opacity: 1;
  transform: translateY(0);
}

/* ===== REDUCED MOTION ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
  .reveal { opacity: 1; transform: none; }
}

@media (hover: none) {
  .btn-primary:hover { transform: none; }
  .btn-ghost:hover { transform: none; }
}
</style>
