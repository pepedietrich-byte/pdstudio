<style>
/* ============================================================
   PHO SAIGON LEIPZIG — premium React build
   Drenched warm amber · bistro-modern · Bricolage Grotesque
   ============================================================ */

:root {
  --ease-out:    cubic-bezier(0.23, 1, 0.32, 1);
  --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);

  /* ===== DRENCHED WARM AMBER PALETTE ===== */
  --brand:        oklch(0.40 0.105 52);   /* pho-broth amber-brown */
  --brand-deep:   oklch(0.32 0.088 48);   /* darker surfaces */
  --brand-rich:   oklch(0.36 0.098 50);   /* card surfaces */
  --brand-bright: oklch(0.60 0.130 58);   /* golden accent */
  --brand-dark:   oklch(0.26 0.075 46);   /* deepest */

  --ink:       oklch(0.97 0.018 82);      /* warm cream */
  --ink-soft:  oklch(0.88 0.022 74);
  --ink-mute:  oklch(0.76 0.028 62);
  --ink-faint: oklch(0.65 0.035 55);

  --line:        oklch(0.97 0.018 82 / 0.15);
  --line-strong: oklch(0.97 0.018 82 / 0.30);

  --cream:        oklch(0.96 0.022 80);
  --ink-on-cream: oklch(0.22 0.068 46);

  --display: "Bricolage Grotesque", "Inter", system-ui, sans-serif;
  --sans:    "Inter", system-ui, -apple-system, sans-serif;
  --mono:    "JetBrains Mono", ui-monospace, monospace;

  --r-sm: 4px;
  --r-md: 10px;
  --r-lg: 14px;

  --container: 1320px;
  --banner-h:  36px;
  --nav-h:     68px;
}

* { box-sizing: border-box; }
*::selection { background: var(--cream); color: var(--ink-on-cream); }
html { scroll-behavior: smooth; }
html, body {
  margin: 0; padding: 0;
  background: var(--brand);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; transition: color 200ms var(--ease-out), opacity 200ms var(--ease-out); }
a:hover { color: var(--cream); }
button { font: inherit; cursor: pointer; }

/* ===== DEMO BANNER ===== */
.demo-banner {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--banner-h);
  background: var(--brand-dark);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center; gap: 14px;
  font-family: var(--mono);
  font-size: 10.5px; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-mute);
  padding: 0 20px;
}
.demo-banner strong { color: var(--ink); font-weight: 600; }
.demo-banner .sep { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-faint); flex-shrink: 0; }

#root { padding-top: var(--banner-h); }

/* ===== TYPOGRAPHY ===== */
.eyebrow {
  font-family: var(--mono);
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--ink-mute);
}
.lead {
  font-size: clamp(16px, 1.35vw, 18px);
  line-height: 1.6; color: var(--ink-soft); text-wrap: pretty;
}

/* ===== CONTAINER & SECTION ===== */
.container {
  width: 100%; max-width: var(--container);
  margin: 0 auto; padding: 0 clamp(20px, 5vw, 48px);
}
section { padding: clamp(88px, 11vw, 152px) 0; position: relative; }
@media (max-width: 768px) { section { padding: 72px 0; } }

/* ===== NAV ===== */
.nav {
  position: sticky; top: var(--banner-h); z-index: 50;
  background: oklch(0.40 0.105 52 / 0.84);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border-bottom: 1px solid var(--line);
  transition: background 300ms var(--ease-out), box-shadow 300ms var(--ease-out);
}
.nav.scrolled {
  background: oklch(0.30 0.085 47 / 0.96);
  box-shadow: 0 4px 28px -8px oklch(0 0 0 / 0.35);
}
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: var(--nav-h); gap: 24px;
}
.nav-brand {
  font-family: var(--display); font-size: 22px; font-weight: 700;
  letter-spacing: -0.03em; color: var(--ink);
  display: flex; align-items: baseline; gap: 5px;
}
.nav-brand em { font-style: italic; font-weight: 400; color: var(--ink-soft); }
.nav-links {
  display: flex; align-items: center; gap: clamp(16px, 2.2vw, 30px);
  list-style: none; margin: 0; padding: 0;
}
.nav-links a { font-size: 14px; font-weight: 500; color: var(--ink-soft); letter-spacing: -0.005em; }
.nav-links a:hover { color: var(--ink); }
.nav-ctas { display: flex; gap: 8px; align-items: center; }
.nav-cta {
  display: inline-flex; align-items: center; gap: 7px;
  height: 40px; padding: 0 18px; border-radius: 999px;
  background: var(--cream); color: var(--ink-on-cream);
  font-weight: 600; font-size: 14px; border: 0;
  transition: transform 160ms var(--ease-out), background 200ms var(--ease-out);
}
.nav-cta:hover { background: oklch(1 0 0); color: var(--ink-on-cream); }
.nav-cta:active { transform: scale(0.97); }
.nav-toggle {
  display: none; width: 40px; height: 40px;
  background: transparent; border: 1px solid var(--line-strong);
  border-radius: var(--r-md); color: var(--ink);
  align-items: center; justify-content: center;
}
@media (max-width: 900px) {
  .nav-links { display: none; }
  .nav-toggle { display: inline-flex; }
}
.mobile-menu {
  position: fixed;
  inset: calc(var(--banner-h) + var(--nav-h)) 0 0 0;
  background: var(--brand-deep);
  border-top: 1px solid var(--line);
  padding: 28px clamp(20px, 5vw, 48px) 40px;
  transform: translateY(-10px); opacity: 0; pointer-events: none;
  transition: transform 240ms var(--ease-out), opacity 200ms var(--ease-out);
  z-index: 49; overflow-y: auto;
  display: flex; flex-direction: column; gap: 0;
}
.mobile-menu.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
.mobile-menu a {
  font-family: var(--display); font-weight: 600; font-size: 30px;
  letter-spacing: -0.025em; padding: 14px 0;
  border-bottom: 1px solid var(--line); color: var(--ink); display: block;
}
.mobile-menu .mob-cta-row { margin-top: 24px; }
.mobile-menu .mob-cta-row .nav-cta { font-size: 16px; height: 52px; padding: 0 26px; }

/* ===== BUTTONS ===== */
.btn-primary {
  display: inline-flex; align-items: center; gap: 10px;
  height: 58px; padding: 0 30px; border-radius: 999px;
  background: var(--cream); color: var(--ink-on-cream);
  font-weight: 700; font-size: 16px; letter-spacing: -0.01em; border: 0;
  transition: transform 160ms var(--ease-out), background 200ms var(--ease-out), box-shadow 200ms var(--ease-out);
}
.btn-primary:hover { background: oklch(1 0 0); box-shadow: 0 16px 36px -10px oklch(0 0 0 / 0.28); }
.btn-primary:active { transform: scale(0.97); }
.btn-ghost {
  display: inline-flex; align-items: center; gap: 10px;
  height: 58px; padding: 0 26px; border-radius: 999px;
  background: transparent; color: var(--ink);
  font-weight: 600; font-size: 16px;
  border: 1.5px solid var(--line-strong);
  transition: transform 160ms var(--ease-out), border-color 200ms var(--ease-out), background 200ms var(--ease-out);
}
.btn-ghost:hover { border-color: var(--cream); background: oklch(0.97 0.018 82 / 0.06); color: var(--ink); }
.btn-ghost:active { transform: scale(0.97); }

/* ===== HERO ===== */
.hero {
  min-height: calc(100dvh - var(--banner-h) - var(--nav-h));
  padding: clamp(56px, 7vw, 96px) 0;
  display: flex; flex-direction: column; justify-content: center;
  position: relative; overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0; z-index: 0;
}
.hero-bg img {
  width: 100%; height: 100%; object-fit: cover;
  filter: brightness(0.42) saturate(1.08) contrast(1.06);
}
.hero-bg::after {
  content: ''; position: absolute; inset: 0;
  background:
    linear-gradient(180deg, oklch(0.32 0.088 48 / 0.52) 0%, transparent 35%, transparent 52%, oklch(0.32 0.088 48 / 0.78) 100%),
    linear-gradient(90deg, oklch(0.32 0.088 48 / 0.82) 0%, oklch(0.32 0.088 48 / 0.30) 55%, transparent 100%);
}
.hero-content { position: relative; z-index: 1; }
.hero-top {
  display: flex; justify-content: space-between; align-items: flex-start; gap: 24px;
  margin-bottom: clamp(40px, 7vw, 90px);
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 12px;
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft);
}
.hero-eyebrow::before { content: ''; width: 28px; height: 1px; background: var(--line-strong); }
.hero-live {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--ink-soft);
}
.pulse {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--cream); display: inline-block;
  animation: pulse 2s var(--ease-out) infinite;
}
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 oklch(0.96 0.022 80 / 0.65); }
  100% { box-shadow: 0 0 0 9px oklch(0.96 0.022 80 / 0); }
}
.hero h1 {
  font-family: var(--display); font-weight: 600;
  font-size: clamp(52px, 10.5vw, 148px);
  line-height: 0.88; letter-spacing: -0.04em;
  margin: 0; color: var(--ink); text-wrap: balance;
  font-variation-settings: 'opsz' 96;
}
.hero h1 .light {
  font-weight: 300; font-style: italic; display: block;
  color: var(--ink-soft); letter-spacing: -0.03em;
}
.hero-meta {
  display: grid; grid-template-columns: 6fr 3.5fr 3.5fr;
  gap: clamp(18px, 3vw, 52px); align-items: end;
  margin-top: clamp(44px, 6vw, 88px);
  padding-top: 24px; border-top: 1px solid var(--line);
}
@media (max-width: 720px) { .hero-meta { grid-template-columns: 1fr; gap: 24px; } }
.hero-sub {
  font-size: clamp(14.5px, 1.25vw, 17px); line-height: 1.54;
  color: var(--ink-soft); max-width: 42ch; margin: 0; text-wrap: pretty;
}
.hero-stat { display: flex; flex-direction: column; gap: 4px; }
.hero-stat .k {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-mute);
}
.hero-stat .v {
  font-family: var(--display); font-size: clamp(18px, 1.9vw, 24px);
  font-weight: 500; letter-spacing: -0.018em; color: var(--ink); line-height: 1.15;
}
.hero-ctas {
  display: flex; gap: 12px; align-items: center;
  margin-top: clamp(36px, 5vw, 52px);
}
@media (max-width: 460px) { .hero-ctas { flex-direction: column; align-items: stretch; } }

/* ===== SHOWCASE ===== */
.showcase {
  position: relative; width: 100%;
  height: clamp(360px, 62vh, 660px);
  overflow: hidden; padding: 0;
  background: var(--brand-deep);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.showcase img {
  width: 100%; height: 100%; object-fit: cover;
  filter: brightness(0.84) contrast(1.06) saturate(1.10);
}
.showcase::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background:
    linear-gradient(180deg, oklch(0.32 0.088 48 / 0.26) 0%, transparent 30%, transparent 50%, oklch(0.32 0.088 48 / 0.90) 100%),
    linear-gradient(90deg, oklch(0.32 0.088 48 / 0.58) 0%, transparent 45%);
}
.showcase-caption {
  position: absolute; left: clamp(20px, 5vw, 64px); bottom: clamp(28px, 5vw, 52px);
  z-index: 1; max-width: 520px;
}
.showcase-caption .eyebrow { display: block; margin-bottom: 12px; color: var(--ink-soft); }
.showcase-caption p {
  font-family: var(--display); font-style: italic; font-weight: 400;
  font-size: clamp(22px, 2.5vw, 32px); line-height: 1.18;
  letter-spacing: -0.025em; color: var(--ink); margin: 0; text-wrap: balance;
}

/* ===== TRUST STRIP ===== */
.trust {
  border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
  background: oklch(0.38 0.100 51);
}
.trust-row {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 18px; flex-wrap: wrap; padding: 32px 0;
}
.trust-item { display: inline-flex; align-items: baseline; gap: 10px; }
.trust-item .n {
  font-family: var(--display); font-size: clamp(24px, 3vw, 38px);
  font-weight: 500; letter-spacing: -0.025em; line-height: 1; color: var(--ink);
}
.trust-item .l {
  font-family: var(--mono); font-size: 10.5px; font-weight: 500;
  letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-mute); max-width: 17ch;
}

/* ===== KONZEPT ===== */
.konzept-grid {
  display: grid; grid-template-columns: 5fr 7fr;
  gap: clamp(40px, 6vw, 96px); align-items: start;
}
@media (max-width: 900px) { .konzept-grid { grid-template-columns: 1fr; gap: 40px; } }
.konzept-side h2 {
  font-family: var(--display); font-weight: 500;
  font-size: clamp(38px, 5.5vw, 72px);
  line-height: 0.95; letter-spacing: -0.035em;
  margin: 16px 0 0; color: var(--ink); text-wrap: balance;
}
.konzept-side h2 em { font-style: italic; font-weight: 400; color: var(--ink-soft); }
.konzept-img {
  margin-top: 28px; border-radius: var(--r-lg); overflow: hidden;
  border: 1px solid var(--line); position: relative;
}
.konzept-img img { width: 100%; height: auto; display: block; filter: brightness(0.93) contrast(1.05); }
.konzept-img::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(180deg, transparent 58%, oklch(0.32 0.088 48 / 0.24) 100%);
}
.konzept-body p {
  font-size: clamp(15.5px, 1.25vw, 17.5px); line-height: 1.62;
  color: var(--ink-soft); max-width: 55ch; margin: 0 0 20px; text-wrap: pretty;
}
.konzept-body p:first-of-type { font-size: clamp(17px, 1.45vw, 20px); color: var(--ink); }
.konzept-facts {
  margin-top: 32px; padding-top: 26px; border-top: 1px solid var(--line);
  display: grid; grid-template-columns: 1fr 1fr 1fr;
}
@media (max-width: 560px) { .konzept-facts { grid-template-columns: 1fr; } }
.konzept-fact { padding: 0 20px 0 0; border-right: 1px solid var(--line); }
.konzept-fact:last-child { border-right: 0; padding-right: 0; }
@media (max-width: 560px) {
  .konzept-fact { padding: 16px 0; border-right: 0; border-bottom: 1px solid var(--line); }
  .konzept-fact:last-child { border-bottom: 0; }
}
.konzept-fact .k {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 8px;
}
.konzept-fact .v {
  font-family: var(--display); font-size: clamp(16px, 1.4vw, 19px);
  font-weight: 500; letter-spacing: -0.015em; line-height: 1.22; color: var(--ink);
}

/* ===== ATMOSPHÄRE CINEMATIC ===== */
.atmo-strip {
  position: relative; width: 100%;
  height: clamp(280px, 48vh, 520px); overflow: hidden; padding: 0;
  border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
}
.atmo-strip img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.80) contrast(1.04) saturate(1.08); }
.atmo-strip::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(90deg, oklch(0.32 0.088 48 / 0.70) 0%, transparent 50%, oklch(0.32 0.088 48 / 0.25) 100%);
}
.atmo-text {
  position: absolute; left: clamp(20px, 5vw, 64px); top: 50%; transform: translateY(-50%);
  z-index: 1; max-width: 440px;
}
.atmo-text .eyebrow { display: block; margin-bottom: 14px; }
.atmo-text p {
  font-family: var(--display); font-size: clamp(20px, 2.2vw, 28px);
  font-weight: 500; letter-spacing: -0.022em; line-height: 1.2;
  color: var(--ink); margin: 0; text-wrap: balance;
}

/* ===== MENU / KARTE ===== */
.menu-section { background: var(--brand-deep); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
.menu-head {
  display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: end;
  margin-bottom: clamp(36px, 5vw, 64px);
}
@media (max-width: 720px) { .menu-head { grid-template-columns: 1fr; gap: 20px; } }
.menu-head h2 {
  font-family: var(--display); font-weight: 600;
  font-size: clamp(50px, 9vw, 128px);
  line-height: 0.86; letter-spacing: -0.04em;
  margin: 16px 0 0; color: var(--ink); text-wrap: balance;
  font-variation-settings: 'opsz' 96;
}
.menu-head h2 em { font-style: italic; font-weight: 400; color: var(--ink-soft); }
.menu-demo-note {
  margin-bottom: clamp(32px, 4.5vw, 52px);
  padding: 14px 18px;
  background: oklch(0.97 0.018 82 / 0.04);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-mute);
}
.demo-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ink-mute); flex-shrink: 0; }
.menu-spread {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: clamp(28px, 4vw, 52px) clamp(44px, 7vw, 112px);
}
@media (max-width: 720px) { .menu-spread { grid-template-columns: 1fr; } }
.menu-group { display: flex; flex-direction: column; gap: 20px; }
.menu-group-head {
  display: flex; align-items: baseline; justify-content: space-between;
  padding-bottom: 14px; border-bottom: 1px solid var(--line-strong);
}
.menu-group-head h3 { font-family: var(--display); font-weight: 600; font-size: 20px; letter-spacing: -0.018em; margin: 0; color: var(--ink); }
.menu-group-head span { font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-mute); }
.dish { display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: baseline; }
.dish-name { font-family: var(--display); font-weight: 600; font-size: 18px; letter-spacing: -0.012em; color: var(--ink); line-height: 1.2; margin: 0 0 4px; }
.dish-name em { font-style: italic; font-weight: 400; color: var(--ink-soft); }
.dish-desc { font-size: 13px; line-height: 1.52; color: var(--ink-mute); margin: 0; max-width: 44ch; }
.dish-price { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--ink); white-space: nowrap; letter-spacing: -0.01em; }

  display: inline-block; font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em;

  border: 1px solid var(--line-strong); border-radius: 999px; margin-left: 7px; vertical-align: middle;
}
.menu-foot {
  margin-top: clamp(44px, 5.5vw, 68px); padding-top: 28px;
  border-top: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;
}
.menu-foot p { margin: 0; font-size: 14px; color: var(--ink-soft); max-width: 60ch; }

/* ===== ZEITEN ===== */
.hours-section { background: var(--brand-rich); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
.hours-grid { display: grid; grid-template-columns: 4fr 8fr; gap: clamp(40px, 6vw, 96px); align-items: start; }
@media (max-width: 900px) { .hours-grid { grid-template-columns: 1fr; gap: 32px; } }
.hours-head h2 {
  font-family: var(--display); font-weight: 600;
  font-size: clamp(38px, 5.5vw, 62px);
  line-height: 0.95; letter-spacing: -0.035em; margin: 16px 0 16px; color: var(--ink);
}
.hours-head h2 em { font-style: italic; font-weight: 400; color: var(--ink-soft); }
.hours-head .lead { max-width: 32ch; margin-top: 0; }
.hours-list { border-top: 1px solid var(--line); }
.hours-row {
  display: grid; grid-template-columns: 132px 1fr auto;
  gap: 14px; align-items: baseline;
  padding: 17px 0; border-bottom: 1px solid var(--line);
}
.hours-row.today { background: oklch(0.97 0.018 82 / 0.04); padding: 17px 12px; margin: 0 -12px; }
.hours-row .day { font-family: var(--display); font-weight: 600; font-size: 18px; letter-spacing: -0.015em; color: var(--ink); }
.hours-row .marker { font-family: var(--mono); font-size: 10.5px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute); }
.hours-row.today .marker { color: var(--ink); }
.hours-row .time { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--ink); letter-spacing: -0.01em; }
.hours-row.ruhetag .time { color: var(--ink-mute); }

/* ===== ANFAHRT / KONTAKT ===== */
.contact-section { background: var(--brand-deep); border-top: 1px solid var(--line); }
.contact-grid { display: grid; grid-template-columns: 7fr 5fr; gap: clamp(40px, 6vw, 96px); align-items: start; }
@media (max-width: 900px) { .contact-grid { grid-template-columns: 1fr; gap: 48px; } }
.contact-side h2 {
  font-family: var(--display); font-weight: 600;
  font-size: clamp(36px, 5.2vw, 66px);
  line-height: 0.95; letter-spacing: -0.035em; margin: 16px 0 20px; color: var(--ink);
}
.contact-side h2 em { font-style: italic; font-weight: 400; color: var(--ink-soft); }
.contact-side > .lead { margin-bottom: 30px; }
.contact-block { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-bottom: 28px; }
@media (max-width: 560px) { .contact-block { grid-template-columns: 1fr; } }
.contact-cell .key { font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 7px; }
.contact-cell .val { font-family: var(--display); font-size: 19px; font-weight: 500; letter-spacing: -0.015em; color: var(--ink); line-height: 1.3; }
.contact-cell .val.mono { font-family: var(--mono); font-size: 14px; letter-spacing: 0; }
.contact-cell .val a { border-bottom: 1px solid var(--line-strong); padding-bottom: 1px; color: var(--ink); }
.contact-cell .val a:hover { color: var(--cream); border-bottom-color: var(--cream); }
.map-frame {
  border-radius: var(--r-lg); overflow: hidden;
  border: 1px solid var(--line); position: relative; aspect-ratio: 4 / 3.2;
}
.map-frame iframe { width: 100%; height: 100%; display: block; border: 0; filter: saturate(0.85) brightness(0.90); }
.map-frame-footer {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 12px 16px;
  background: linear-gradient(0deg, oklch(0.32 0.088 48 / 0.96) 0%, transparent 100%);
  display: flex; align-items: center; justify-content: flex-end;
}
.map-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink);
}
.map-link svg { flex-shrink: 0; }

/* ===== FOOTER ===== */
footer { background: oklch(0.26 0.075 46); border-top: 1px solid var(--line); padding: 72px 0 28px; }
.footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px; margin-bottom: 56px; }
@media (max-width: 720px) { .footer-grid { grid-template-columns: 1fr 1fr; gap: 28px; } }
@media (max-width: 460px) { .footer-grid { grid-template-columns: 1fr; } }
.footer-brand { font-family: var(--display); font-size: 34px; font-weight: 700; letter-spacing: -0.035em; color: var(--ink); margin-bottom: 8px; line-height: 1; }
.footer-brand em { font-style: italic; font-weight: 400; color: var(--ink-soft); }
.footer-sub { font-family: var(--mono); font-size: 10.5px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 14px; }
.footer-desc { color: var(--ink-soft); font-size: 14px; max-width: 34ch; line-height: 1.56; margin: 0; }
.footer-col h4 { font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-mute); margin: 0 0 16px; }
.footer-col ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 9px; }
.footer-col a { color: var(--ink-soft); font-size: 14px; }
.footer-col a:hover { color: var(--ink); }
.footer-col p { color: var(--ink-soft); font-size: 14px; line-height: 1.55; margin: 0 0 4px; }
.footer-col strong { color: var(--ink); font-weight: 500; }
.footer-col .foot-mute { font-size: 13px; color: var(--ink-mute); }
.footer-bottom {
  border-top: 1px solid var(--line); padding-top: 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
}
.footer-bottom p { font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; color: var(--ink-mute); margin: 0; }
.footer-badge { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); padding: 4px 10px; border: 1px solid var(--line-strong); border-radius: var(--r-sm); }

/* ===== REVEAL ANIMATION ===== */
.reveal { opacity: 0; transform: translateY(16px); transition: opacity 700ms var(--ease-out), transform 700ms var(--ease-out); }
.reveal.in { opacity: 1; transform: translateY(0); }

/* ===== MODAL KEYFRAMES ===== */
@keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ===== ACCESSIBILITY ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
  .reveal { opacity: 1; transform: none; }
  .pulse { animation: none; }
}
@media (hover: none) { .btn-primary:hover, .btn-ghost:hover { transform: none; } }
</style>
