<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Spizz — Jazz Bar & Restaurant Leipzig</title>
    <meta name="description" content="Spizz Leipzig — Jazz Bar und Restaurant am Markt. Täglich ab 12 Uhr. Live Jazz, Cocktails, Brunch.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Restaurant",
      "name": "Spizz",
      "description": "Jazz Bar und Restaurant am Markt in Leipzig",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Markt 9",
        "postalCode": "04109",
        "addressLocality": "Leipzig",
        "addressCountry": "DE"
      },
      "telephone": "+49-341-9608043",
      "url": "https://spizz.de",
      "servesCuisine": ["International", "Bar"],
      "priceRange": "€€",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.1",
        "reviewCount": "1400"
      },
      "openingHoursSpecification": [
        { "@type": "OpeningHoursSpecification", "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday"], "opens": "12:00", "closes": "01:00" },
        { "@type": "OpeningHoursSpecification", "dayOfWeek": ["Friday","Saturday"], "opens": "12:00", "closes": "03:00" },
        { "@type": "OpeningHoursSpecification", "dayOfWeek": "Sunday", "opens": "12:00", "closes": "24:00" }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
